services:
  streamable:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - uploads:/app/uploads
      - thumbnails:/app/thumbnails
      - data:/app/data
    restart: unless-stopped
    environment:
      - PORT=3000
      - PASSWORD=${PASSWORD}

volumes:
  uploads:
  thumbnails:
  data:
