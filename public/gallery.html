<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamable — Gallery</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0a;
      --surface:    #111111;
      --border:     #1e1e1e;
      --amber:      #f5a623;
      --amber-dim:  #c17d0e;
      --amber-glow: rgba(245,166,35,0.1);
      --text:       #e8e8e8;
      --muted:      #555;
      --radius:     4px;
    }

    html { height: 100%; }
    body {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .page {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 28px 80px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────── */
    header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(-10px);
      animation: fadeUp 0.45s ease forwards;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    .logo-tag {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 2px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .video-count {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    /* ── Controls row ────────────────────────────────── */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp 0.45s ease 0.1s forwards;
    }

    .sort-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 2px;
    }

    .sort-btn {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: border-color 0.15s, color 0.15s;
    }

    .sort-btn:hover  { border-color: #444; color: var(--text); }
    .sort-btn.active { border-color: var(--amber-dim); color: var(--amber); }

    .search-wrap { margin-left: auto; }

    .search-input {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text);
      outline: none;
      width: 180px;
      transition: border-color 0.15s, width 0.2s;
    }

    .search-input:focus { border-color: #444; width: 220px; }
    .search-input::placeholder { color: var(--muted); }

    /* ── Tag filter bar ──────────────────────────────── */
    .tag-filter-bar {
      display: none;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.45s ease 0.15s forwards;
    }

    .tag-filter-bar.has-tags { display: flex; }

    .filter-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 2px;
    }

    .filter-btn {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .filter-btn:hover  { border-color: #444; color: var(--text); }
    .filter-btn.active { border-color: var(--amber-dim); color: var(--amber); background: var(--amber-glow); }

    /* ── Grid ────────────────────────────────────────── */
    #gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      opacity: 0;
      animation: fadeUp 0.45s ease 0.2s forwards;
    }

    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
      display: block;
      color: inherit;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.35s ease forwards;
    }

    .video-card:hover { border-color: #333; transform: translateY(-2px); }

    .video-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .video-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.5));
    }

    .thumb-duration {
      position: absolute;
      bottom: 7px;
      right: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #fff;
      background: rgba(0,0,0,0.72);
      padding: 2px 5px;
      border-radius: 3px;
      z-index: 2;
      letter-spacing: 0.3px;
    }

    .play-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(245,166,35,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      z-index: 1;
    }

    .video-card:hover .play-icon {
      border-color: var(--amber);
      background: var(--amber-glow);
    }

    .video-info { padding: 12px; }

    .video-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }

    .video-meta {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 8px;
    }

    .tag-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 7px;
    }

    .tag-chip {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--amber);
      background: var(--amber-glow);
      border: 1px solid rgba(245,166,35,0.2);
      border-radius: 3px;
      padding: 1px 5px;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .tag-chip:hover { background: rgba(245,166,35,0.18); }

    /* ── Load more ───────────────────────────────────── */
    .load-more-wrap {
      display: flex;
      justify-content: center;
      margin-top: 32px;
    }

    .btn-load-more {
      padding: 9px 28px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-load-more:hover { border-color: #444; color: var(--text); }

    /* ── Empty ───────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      grid-column: 1 / -1;
    }

    /* ── Animations ──────────────────────────────────── */
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a class="logo" href="/">streamable</a>
      <span class="logo-tag">Gallery</span>
      <div class="header-right">
        <span class="video-count" id="video-count"></span>
      </div>
    </header>

    <div class="controls-row">
      <span class="sort-label">Sort</span>
      <button class="sort-btn active" data-sort="date">Newest</button>
      <button class="sort-btn" data-sort="views">Most viewed</button>
      <button class="sort-btn" data-sort="name">Name</button>
      <div class="search-wrap">
        <input class="search-input" id="search-input" type="text" placeholder="Search…" autocomplete="off" />
      </div>
    </div>

    <div class="tag-filter-bar" id="tag-filter-bar"></div>

    <div id="gallery-grid"></div>

    <div class="load-more-wrap" id="load-more-wrap" style="display:none">
      <button class="btn-load-more" id="btn-load-more">Load more</button>
    </div>

  </div>

  <script>
  (() => {
    let allVideos   = [];
    let currentSort = 'date';
    let activeTag   = null;
    let searchQuery = '';
    const PAGE_SIZE  = 24;
    let visibleCount = PAGE_SIZE;

    const grid        = document.getElementById('gallery-grid');
    const loadMoreWrap = document.getElementById('load-more-wrap');
    const loadMoreBtn  = document.getElementById('btn-load-more');

    const sortFns = {
      date:  (a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt),
      views: (a, b) => b.views - a.views,
      name:  (a, b) => (a.title || a.filename).localeCompare(b.title || b.filename),
    };

    // Sort buttons
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentSort  = btn.dataset.sort;
        visibleCount = PAGE_SIZE;
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    // Search
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery  = e.target.value.trim().toLowerCase();
      visibleCount = PAGE_SIZE;
      render();
    });

    // Load more
    loadMoreBtn.addEventListener('click', () => {
      visibleCount += PAGE_SIZE;
      render();
    });

    function renderTagFilter() {
      const bar     = document.getElementById('tag-filter-bar');
      const allTags = [...new Set(allVideos.flatMap(v => v.tags || []))].sort();
      if (!allTags.length) { bar.classList.remove('has-tags'); return; }
      bar.classList.add('has-tags');
      bar.innerHTML =
        `<span class="filter-label">Tag</span>` +
        `<button class="filter-btn ${!activeTag ? 'active' : ''}" data-tag="">All</button>` +
        allTags.map(t =>
          `<button class="filter-btn ${activeTag === t ? 'active' : ''}" data-tag="${esc(t)}">${esc(t)}</button>`
        ).join('');
      bar.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTag    = btn.dataset.tag || null;
          visibleCount = PAGE_SIZE;
          renderTagFilter();
          render();
        });
      });
    }

    function render() {
      let videos = [...allVideos];

      if (searchQuery) {
        videos = videos.filter(v =>
          (v.title || v.filename).toLowerCase().includes(searchQuery) ||
          (v.tags || []).some(t => t.toLowerCase().includes(searchQuery))
        );
      }

      if (activeTag) {
        videos = videos.filter(v => (v.tags || []).includes(activeTag));
      }

      videos.sort(sortFns[currentSort]);

      if (!videos.length) {
        grid.innerHTML = `<div class="empty-state">${allVideos.length ? 'no matches' : 'no public videos yet'}</div>`;
        loadMoreWrap.style.display = 'none';
        return;
      }

      const page = videos.slice(0, visibleCount);
      loadMoreWrap.style.display = videos.length > visibleCount ? 'flex' : 'none';
      loadMoreBtn.textContent = `Load more (${videos.length - visibleCount} remaining)`;

      grid.innerHTML = '';
      page.forEach((v, i) => {
        const tagHtml = v.tags && v.tags.length
          ? `<div class="tag-chips">${v.tags.map(t => `<span class="tag-chip" data-tag="${esc(t)}">${esc(t)}</span>`).join('')}</div>`
          : '';
        const card = document.createElement('a');
        card.className = 'video-card';
        card.href      = `/${v.slug}`;
        card.style.animationDelay = (i * 0.03) + 's';
        card.innerHTML = `
          <div class="video-thumb" style="${v.hasThumbnail ? `background-image:url('/thumb/${v.slug}');background-size:cover;background-position:center;` : ''}">
            <div class="play-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#f5a623"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </div>
            ${v.duration ? `<span class="thumb-duration">${fmtDuration(v.duration)}</span>` : ''}
          </div>
          <div class="video-info">
            <div class="video-title">${esc(v.title || v.filename)}</div>
            <div class="video-meta">
              <span>${v.views} view${v.views === 1 ? '' : 's'}</span>
              <span>${fmtDate(v.uploadedAt)}</span>
            </div>
            ${tagHtml}
          </div>
        `;
        grid.appendChild(card);
      });

      // Tag chip click → filter
      grid.querySelectorAll('.tag-chip').forEach(chip => {
        chip.addEventListener('click', e => {
          e.preventDefault(); e.stopPropagation();
          activeTag    = chip.dataset.tag;
          visibleCount = PAGE_SIZE;
          renderTagFilter();
          render();
        });
      });
    }

    async function load() {
      try {
        const res  = await fetch('/api/videos'); // no auth → only public videos
        allVideos  = await res.json();
        const countEl = document.getElementById('video-count');
        countEl.textContent = `${allVideos.length} video${allVideos.length === 1 ? '' : 's'}`;
        renderTagFilter();
        render();
      } catch (e) { console.error(e); }
    }

    function fmtDuration(s) {
      if (!s) return '';
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return h ? `${h}:${String(m).padStart(2,'0')}:${sec}` : `${m}:${sec}`;
    }

    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
  })();
  </script>
</body>
</html>
